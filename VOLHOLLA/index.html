<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOLHOLLA Shields</title>
  <link rel="icon" href='data:image/svg+xml;utf8,
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <path d="M100 20 Q140 40 170 60 Q170 120 140 160 Q100 180 60 160 Q30 120 30 60 Q60 40 100 20 Z" fill="%230e0e0e" stroke="%23ff8a00" stroke-width="10"/>
    </svg>' />
  <style>
    :root {
      --bg: #0d0d0f;
      --panel: #17171b;
      --panel-2: #1e1f24;
      --text: #f3f0e9;
      --muted: #bdb6a7;
      --fire: #ff7a16;
      --ember: #ffb761;
      --steel: #c4c7cf;
      --line: rgba(255,255,255,0.08);
      --shadow: rgba(0,0,0,0.45);
      --safe-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
      --ui-scale: 1;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 600px at 50% -15%, rgba(255,122,22,0.20), transparent 60%),
        linear-gradient(180deg, #151519 0%, #0c0c0f 100%);
      min-height: 100vh;
      --header-h: calc(84px * var(--ui-scale));
      --player-h: calc(142px * var(--ui-scale));
    }

    body.big-text { --ui-scale: 1.15; }

    .page {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 12px calc(var(--player-h) + var(--safe-bottom) + 18px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 8px 0 6px;
      background: linear-gradient(180deg, rgba(13,13,15,0.96), rgba(13,13,15,0.86));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .topbar-card {
      background: linear-gradient(180deg, rgba(28,28,33,0.96), rgba(18,18,22,0.96));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 24px var(--shadow);
      padding: 10px;
    }

    .brand-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .brand-right {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .brand .mini-shield {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      filter: drop-shadow(0 3px 0 rgba(0,0,0,0.35));
    }

    .brand-title {
      line-height: 1;
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .brand-now {
      display: inline-flex;
      color: var(--muted);
      font-size: calc(0.72rem * var(--ui-scale));
      font-weight: 700;
      letter-spacing: 0.03em;
      max-width: min(72vw, 560px);
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 2px 8px 2px 4px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    }

    .brand-now .tag {
      color: var(--ember);
      font-weight: 800;
      margin-right: 0;
      text-transform: uppercase;
      font-size: 0.82em;
      letter-spacing: 0.08em;
      border-radius: 999px;
      border: 1px solid rgba(255,183,97,0.22);
      background: rgba(255,183,97,0.08);
      padding: 2px 6px;
      line-height: 1;
    }

    .brand-now-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .brand-title strong {
      display: block;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: calc(0.95rem * var(--ui-scale));
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(52vw, 420px);
    }

    .mini-count {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: calc(0.72rem * var(--ui-scale));
      font-weight: 800;
      min-height: 28px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .mini-link {
      appearance: none;
      cursor: pointer;
      font: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--ember);
      text-decoration: none;
      font-size: calc(0.72rem * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 1px 1px 0 rgba(0,0,0,0.35);
    }

    .mini-link:active { transform: translateY(1px); }

    .mini-link.icon-only {
      width: 28px;
      min-width: 28px;
      padding: 0;
      font-size: calc(0.9rem * var(--ui-scale));
      line-height: 1;
    }

    .mini-menu {
      position: relative;
    }

    .mini-menu > summary {
      list-style: none;
    }

    .mini-menu > summary::-webkit-details-marker { display: none; }

    .mini-menu[open] > summary {
      background: linear-gradient(180deg, #ffd28a, #ffb761);
      color: #241400;
      border-color: rgba(0,0,0,0.5);
    }

    .mini-menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      width: min(78vw, 260px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.09);
      background: linear-gradient(180deg, rgba(33,34,40,0.98), rgba(19,19,24,0.98));
      box-shadow: 0 14px 28px rgba(0,0,0,0.42);
      padding: 8px;
      display: grid;
      gap: 8px;
      z-index: 50;
    }

    .mini-menu-label {
      min-height: 26px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
      padding: 5px 8px;
      color: var(--muted);
      font-size: calc(0.68rem * var(--ui-scale));
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-menu-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .mini-menu-btn {
      appearance: none;
      min-height: 34px;
      border-radius: 10px;
      border: 1px solid #000;
      background: linear-gradient(180deg, #2a2c33, #1f2027);
      color: var(--text);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.45);
      font-weight: 800;
      font-size: calc(0.72rem * var(--ui-scale));
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0 8px;
      touch-action: manipulation;
    }

    .mini-menu-btn:active { transform: translateY(1px); }

    .mini-menu-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .finder-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .area-row { display: grid; gap: 4px; margin-bottom: 4px; }

    .area-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 4px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }

    .area-strip::-webkit-scrollbar {
      height: 6px;
    }

    .area-strip::-webkit-scrollbar-thumb {
      background: #343741;
      border-radius: 999px;
    }

    .area-card {
      flex: 0 0 auto;
      scroll-snap-align: start;
      width: 206px;
      min-height: 64px;
      border-radius: 14px;
      border: 1px solid #000;
      background: linear-gradient(180deg, #272932, #1f2027);
      color: var(--text);
      padding: 7px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.45);
      cursor: pointer;
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 8px;
      align-items: center;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .area-card::before {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 3px;
      background: linear-gradient(90deg, var(--area-a, #ff8a00), var(--area-b, #ffb761));
      opacity: 0.85;
    }

    .area-card .thumb {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
    }

    .area-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .area-card .thumb .thumb-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 120% at 20% 10%, color-mix(in srgb, var(--area-a, #ff8a00) 35%, transparent), transparent 65%),
        linear-gradient(160deg, #22242b, #17181d);
      color: var(--area-b, #ffb761);
      font-weight: 900;
      font-size: calc(0.9rem * var(--ui-scale));
      letter-spacing: 0.08em;
    }

    .area-card .meta { min-width: 0; display: grid; gap: 2px; }

    .area-card .name {
      font-weight: 900;
      font-size: calc(0.8rem * var(--ui-scale));
      line-height: 1.05;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .area-card .sub { display: none; }

    .area-card .count {
      color: var(--area-b, #ffb761);
      font-size: calc(0.66rem * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .area-card[aria-pressed="true"] {
      background: linear-gradient(180deg, #ffd28a, #ffb761);
      color: #241400;
      outline: 2px solid rgba(255,183,97,0.25);
      outline-offset: 1px;
    }

    .area-card[aria-pressed="true"] .sub {
      color: #4a2d05;
    }

    .area-card[aria-pressed="true"] .count {
      color: #4a2d05;
    }

    .area-card[aria-pressed="true"] .thumb {
      border-color: rgba(66,42,10,0.16);
    }

    .finder-input {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #23252c, #1b1c22);
      color: var(--text);
      padding: 0 12px;
      font-size: calc(0.9rem * var(--ui-scale));
      outline: none;
    }

    .finder-input::placeholder {
      color: #9ca0ab;
    }

    .finder-input:focus-visible {
      border-color: rgba(255,183,97,0.75);
      box-shadow: 0 0 0 2px rgba(255,183,97,0.18);
    }

    .finder-wrap {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      overflow: clip;
    }

    .finder-wrap > summary {
      list-style: none;
      cursor: pointer;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      color: var(--muted);
      font-size: calc(0.72rem * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .finder-wrap > summary .summary-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .finder-wrap > summary::-webkit-details-marker { display: none; }
    .finder-wrap > summary::before {
      content: "⌕";
      color: var(--ember);
      margin-right: 6px;
      font-weight: 900;
    }
    .finder-wrap > summary::after {
      content: "▾";
      color: var(--ember);
      font-size: 0.95em;
    }
    .finder-wrap[open] > summary::after { content: "▴"; }
    .finder-wrap[open] > summary {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .finder-wrap .finder-row {
      padding: 6px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid #000;
      background: linear-gradient(180deg, #26272e, #1d1e24);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: calc(0.84rem * var(--ui-scale));
      min-height: 44px;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.55);
    }

    .pill.fire {
      background: linear-gradient(180deg, #ff9a3d, #ff7616);
      color: #1c0f00;
    }

    .pill[aria-pressed="true"] {
      outline: 2px solid var(--ember);
      outline-offset: 1px;
    }

    .pill:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: 1px 1px 0 rgba(0,0,0,0.45);
    }

    .song-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .song-card {
      position: relative;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(28,29,34,0.95), rgba(18,18,22,0.95));
      box-shadow: 0 10px 18px rgba(0,0,0,0.26);
      padding: 10px;
      display: grid;
      grid-template-columns: minmax(108px, 120px) 1fr auto;
      gap: 10px;
      align-items: center;
      text-align: left;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
      min-height: 120px;
      touch-action: manipulation;
      scroll-margin-top: 88px;
      scroll-margin-bottom: calc(var(--player-h) + 28px);
    }

    .song-card:active { transform: translateY(1px) scale(0.998); }
    .song-card:focus-visible {
      outline: 3px solid var(--ember);
      outline-offset: 2px;
    }

    .song-card.playing {
      border-color: rgba(255,183,97,0.75);
      background:
        radial-gradient(400px 180px at 10% 50%, rgba(255,122,22,0.12), transparent 70%),
        linear-gradient(180deg, rgba(35,30,24,0.98), rgba(22,20,19,0.98));
    }

    .song-card.playing .shield-slot {
      border-color: rgba(255,183,97,0.2);
      box-shadow:
        inset 0 0 0 1px rgba(255,183,97,0.16),
        0 6px 14px rgba(0,0,0,0.22);
    }

    .song-card .shield-slot {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35), 0 6px 14px rgba(0,0,0,0.22);
      background: linear-gradient(180deg, #1d1f25, #14151a);
    }

    .song-card .art-square {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(120% 120% at 20% 10%, rgba(255,122,22,0.16), transparent 60%),
        linear-gradient(180deg, #23252c, #16171d);
    }

    .song-card .art-square img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.02);
      filter: saturate(0.92) contrast(1.03);
    }

    .song-card .art-square.is-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.06), rgba(0,0,0,0.32)),
        radial-gradient(70% 70% at 50% 55%, transparent 30%, rgba(0,0,0,0.18) 100%);
      pointer-events: none;
    }

    .song-card .art-square.is-fallback {
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 120% at 20% 10%, rgba(255,122,22,0.20), transparent 60%),
        linear-gradient(160deg, #22242b, #17181d);
    }

    .song-card .art-square .fallback-shield {
      width: 86px;
      height: 86px;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.34));
    }

    .song-card .shield-svg { display: none; }

    .song-card .meta {
      min-width: 0;
    }

    .song-card .eyebrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: calc(0.72rem * var(--ui-scale));
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .song-card .eyebrow-main {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .song-card .state-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #41444b;
      box-shadow: inset 0 0 0 1px #000;
      flex: 0 0 auto;
    }

    .song-card.playing .state-dot {
      background: var(--fire);
      box-shadow: 0 0 12px rgba(255,122,22,0.65), inset 0 0 0 1px #000;
    }

    .song-card .card-star {
      width: 26px;
      height: 26px;
      min-width: 26px;
      min-height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #24262d, #1b1c22);
      color: #a8acb7;
      font-size: 0.92rem;
      line-height: 1;
      display: grid;
      place-items: center;
      padding: 0;
      box-shadow: 1px 1px 0 rgba(0,0,0,0.45);
      cursor: pointer;
      touch-action: manipulation;
      flex: 0 0 auto;
    }

    .song-card .card-star:active { transform: translateY(1px); }

    .song-card .card-star.is-favorite {
      color: #241400;
      background: linear-gradient(180deg, #ffd08a, #ffb761);
      border-color: rgba(0,0,0,0.5);
    }

    .song-card .title {
      font-size: calc(1rem * var(--ui-scale));
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .song-card .subtitle {
      color: var(--muted);
      font-size: calc(0.76rem * var(--ui-scale));
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-card .right {
      display: grid;
      gap: 3px;
      justify-items: end;
      align-content: center;
      min-width: 58px;
    }

    .song-card .percent {
      font-size: calc(0.74rem * var(--ui-scale));
      color: var(--ember);
      font-weight: 800;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      opacity: 0.95;
    }

    .song-card .duration {
      font-size: calc(0.76rem * var(--ui-scale));
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .song-card .tap-hint {
      display: none;
    }

    .song-card .cta {
      width: 34px;
      height: 34px;
      min-width: 34px;
      min-height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #262932, #1c1e24);
      color: var(--ember);
      font-weight: 900;
      font-size: calc(0.88rem * var(--ui-scale));
      box-shadow: 1px 1px 0 rgba(0,0,0,0.45);
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .song-card.playing .cta {
      background: linear-gradient(180deg, #ffd28a, #ffb761);
      color: #221300;
      border-color: rgba(0,0,0,0.5);
    }

    .song-card .progress-rail {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 7px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
      pointer-events: none;
    }

    .song-card .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(255,183,97,0.65), rgba(255,122,22,0.95));
      border-radius: inherit;
      transition: width .12s linear;
      opacity: 0;
    }

    .song-card.is-current .progress-fill { opacity: 1; }
    .song-card.image-openable .shield-slot { cursor: zoom-in; }

    .player {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: var(--safe-bottom);
      z-index: 40;
      background:
        radial-gradient(500px 140px at 15% 0%, rgba(255,122,22,0.13), transparent 65%),
        linear-gradient(180deg, rgba(28,28,34,0.98), rgba(18,18,22,0.98));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      box-shadow: 0 16px 30px rgba(0,0,0,0.42);
      padding: 8px;
      backdrop-filter: blur(10px);
    }

    .player-top {
      display: none;
    }

    .player-minibar { display: none; }

        .replace(/^geometric ghosts of mitte\s*-\s*/i, "")

        .trim();

    function buildTracks(area, artist = "coolradio") {
      const artistName = area.artist || artist;
      return area.files.map((name, index) => {
        const title = titleFromFilename(name);
        return {
          file: `${area.basePath}${name}`,
          title,
          artist: artistName,
          areaKey: area.key,
          art: area.trackArtByTitle?.[title] || area.trackArtByIndex?.[index] || area.defaultTrackArt || null
        };
      });

      return `${m}:${String(r).padStart(2, "0")}`;

    function currentProgressPct() {
      const dur = els.audio.duration;
      const cur = els.audio.currentTime;
      if (!Number.isFinite(dur) || dur <= 0 || !Number.isFinite(cur) || cur < 0) return 0;
      return Math.max(0, Math.min(100, Math.round((cur / dur) * 100)));
    }

    function updateCardProgressUI() {
      const pct = currentProgressPct();
      const hasCurrent = state.currentIndex >= 0;
      els.list.querySelectorAll(".song-card").forEach((card) => {
        const idx = Number(card.dataset.index);
        if (!Number.isFinite(idx)) return;
        const isCurrent = hasCurrent && idx === state.currentIndex;
        card.classList.toggle("is-current", isCurrent);
        const percentEl = card.querySelector('[data-role="percent"]');
        const fillEl = card.querySelector('[data-role="progress-fill"]');
        if (percentEl) percentEl.textContent = isCurrent ? `${pct}%` : "—";
        if (fillEl) fillEl.style.width = isCurrent ? `${pct}%` : "0%";
      });
    }

    function getInitialAreaKeyFromUrl() {
      try {
        const params = new URLSearchParams(window.location.search);
        const requested = (params.get("album") || params.get("area") || "").trim().toLowerCase();
        if (requested && AREA_DEFS.some((a) => a.key === requested || a.pageSlug === requested)) {
          const match = AREA_DEFS.find((a) => a.key === requested || a.pageSlug === requested);
          return match?.key || state.activeAreaKey;
        }
      } catch {
        // ignore URL parsing issues and fall back
      }
      return state.activeAreaKey;
    }

      params.set("track", String(index + 1));
      if (opts.embed) params.set("embed", "1");
      if (opts.autoplay) params.set("autoplay", "1");
      return `./song.html?${params.toString()}`;

        btn.type = "button";

        btn.setAttribute("aria-label", `Open ${area.label}, ${area.tracks.length} songs`);

        ? `${area.label} · ${count}/${tracks.length} visible · ${favMode}`
        : `${area.label} · ${tracks.length} songs · ${favMode}`;
      els.visibleCount.textContent = state.filterQuery.trim()
        ? `${count}/${tracks.length}`
        : String(tracks.length);
      els.visibleCount.title = fullText;
      els.visibleCount.setAttribute("aria-label", `${area.label}, ${count} visible of ${tracks.length} songs, ${favMode}`);
    }

    function updateTopIdentity() {
      const area = getAreaDef();
      const idx = state.currentIndex;
      const hasTrack = idx >= 0 && tracks[idx];
      const playing = hasTrack && !els.audio.paused;
      if (els.brandAlbumTitle) {
        els.brandAlbumTitle.textContent = area.label;
      }
      if (els.brandNow && els.brandNowText) {
        if (hasTrack) {
          if (els.brandNowTag) els.brandNowTag.textContent = playing ? "NOW" : "PAUSE";
          els.brandNowText.textContent = `${isFavoriteTrack(tracks[idx]) ? "★ " : ""}${tracks[idx].title}`;
        } else {
          if (els.brandNowTag) els.brandNowTag.textContent = "READY";
          els.brandNowText.textContent = "Tap a track";
        }
        els.brandNow.classList.add("show");
      }
      if (els.playerMiniNow) {
        els.playerMiniNow.textContent = hasTrack ? tracks[idx].title : "No song selected";
      }
      if (els.playerMiniState) {
        els.playerMiniState.textContent = playing ? "Playing" : "Paused";
      }
      updateSongLinkMenu();
    }

    function syncPlayerSpace() {
      const h = Math.ceil(els.player.getBoundingClientRect().height || 0);
      if (h > 0) document.body.style.setProperty("--player-h", `${h}px`);
    }

    let syncPlayerSpaceRAF = 0;
    function scheduleSyncPlayerSpace() {
      if (syncPlayerSpaceRAF) cancelAnimationFrame(syncPlayerSpaceRAF);
      syncPlayerSpaceRAF = requestAnimationFrame(() => {
        syncPlayerSpaceRAF = 0;
        syncPlayerSpace();
      });
    }

    function syncResponsivePanels() {
      const mobile = window.matchMedia("(max-width: 700px)").matches;
      if (mobile) {
        if (!state._mobilePanelsInit) {
          if (els.finderWrap) els.finderWrap.open = false;
          if (els.playerExtra) els.playerExtra.open = true;
          state._mobilePanelsInit = true;
        }
      } else {
        if (els.playerExtra) els.playerExtra.open = true;
        state._mobilePanelsInit = false;
      }
      scheduleSyncPlayerSpace();
    }

    function areaThumbHTML(area) {
      if (area.coverImage) {
        return `<img src="${escapeHtml(encodeURI(area.coverImage))}" alt="" loading="lazy" decoding="async">`;
      }
      return `<div class="thumb-fallback">${escapeHtml((area.label || "?").slice(0, 1))}</div>`;
    }

    function shieldSVG(index, active = false, small = false, instanceId = "shield", opts = {}) {
      const motifs = ["line", "ring", "chev", "hammer", "bars", "vmark"];
      const motif = motifs[index % motifs.length];
      const area = getAreaDef();
      const track = tracks[index];
      const useTrackArt = opts.useTrackArt !== false;
      const baseStroke = active ? "#ffd08c" : (area.accentA || "#ff8a00");
      const accent = active ? "#ffd08c" : (area.accentB || "#ffb761");
      const fill = active ? "#24170b" : "#141418";
      const glow = active
        ? "drop-shadow(0 0 10px rgba(255,183,97,.45)) drop-shadow(0 5px 0 rgba(0,0,0,.35))"
        : "drop-shadow(0 5px 0 rgba(0,0,0,.35))";
      const numSize = small ? 26 : 30;
      const ringR = small ? 43 : 46;
      const ringCx = 100;
      const ringCy = small ? 93 : 95;
      const clipId = `clip_${String(instanceId).replace(/[^a-zA-Z0-9_-]/g, "_")}`;
      const artUrl = useTrackArt && track?.art ? encodeURI(track.art) : null;
      const artSize = ringR * 2;
      const artX = ringCx - ringR;
      const artY = ringCy - ringR;

      let motifMarkup = "";
      if (motif === "line") motifMarkup = `<line x1="100" y1="56" x2="100" y2="142" stroke="${accent}" stroke-width="8"/><line x1="64" y1="100" x2="136" y2="100" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "ring") motifMarkup = `<circle cx="100" cy="100" r="34" fill="none" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "chev") motifMarkup = `<polyline points="66,118 100,84 134,118" fill="none" stroke="${accent}" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><polyline points="72,96 100,68 128,96" fill="none" stroke="${accent}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>`;
      if (motif === "hammer") motifMarkup = `<line x1="72" y1="78" x2="128" y2="78" stroke="${accent}" stroke-width="8"/><line x1="100" y1="78" x2="100" y2="138" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "bars") motifMarkup = `<line x1="74" y1="120" x2="90" y2="120" stroke="${accent}" stroke-width="8"/><line x1="90" y1="102" x2="118" y2="102" stroke="${accent}" stroke-width="8"/><line x1="82" y1="84" x2="138" y2="84" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "vmark") motifMarkup = `<path d="M66 80 L100 126 L134 80" fill="none" stroke="${accent}" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>`;

      const artMarkup = artUrl ? `
          <defs>
            <clipPath id="${clipId}">
              <circle cx="${ringCx}" cy="${ringCy}" r="${ringR}"></circle>
            </clipPath>
          </defs>
          <circle cx="${ringCx}" cy="${ringCy}" r="${ringR + 2}" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="2"></circle>
          <image href="${escapeHtml(artUrl)}" x="${artX}" y="${artY}" width="${artSize}" height="${artSize}" preserveAspectRatio="xMidYMid slice" clip-path="url(#${clipId})" opacity="${active ? "0.98" : "0.90"}"></image>
          <circle cx="${ringCx}" cy="${ringCy}" r="${ringR}" fill="none" stroke="${accent}" stroke-width="3" opacity="0.95"></circle>
      ` : `<circle cx="100" cy="100" r="56" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>`;

      return `
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;filter:${glow}">
          <defs>
            <linearGradient id="shieldGrad_${clipId}" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${active ? "#2b1d10" : "#1a1b20"}"></stop>
              <stop offset="100%" stop-color="${active ? "#17120f" : "#111216"}"></stop>
            </linearGradient>
          </defs>
          <path d="M100 20 Q140 40 170 60 Q170 120 140 160 Q100 180 60 160 Q30 120 30 60 Q60 40 100 20 Z"
                fill="url(#shieldGrad_${clipId})" stroke="${baseStroke}" stroke-width="8"/>
          <path d="M100 30 Q132 46 156 62 Q156 112 132 146 Q100 164 68 146 Q44 112 44 62 Q68 46 100 30 Z"
                fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
          ${artMarkup}
          <g opacity="${artUrl ? "0.78" : "1"}">${motifMarkup}</g>
          <text x="100" y="160" fill="${accent}" font-size="${numSize}" font-weight="800" text-anchor="middle" font-family="ui-sans-serif, system-ui">${String(index + 1).padStart(2, "0")}</text>
        </svg>`;
    }

    function renderList() {
      els.list.innerHTML = "";
      const frag = document.createDocumentFragment();
      const visible = getVisibleTrackIndices();

      visible.forEach((index) => {
        const track = tracks[index];
        const isFav = isFavoriteTrack(track);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "song-card";
        btn.dataset.index = String(index);
        btn.setAttribute("aria-label", `Play song ${index + 1}: ${track.title}`);
        btn.innerHTML = `
          <div class="shield-slot">
            ${songCardMediaHTML(index, track, false)}
          </div>
          <div class="meta">
            <div class="eyebrow">
              <div class="eyebrow-main">
                <span class="state-dot" aria-hidden="true"></span>
                <span>Shield ${String(index + 1).padStart(2, "0")}</span>
              </div>
              <button type="button" class="card-star${isFav ? " is-favorite" : ""}" data-role="star" aria-label="${isFav ? "Remove star" : "Star this song"}" title="${isFav ? "Starred" : "Add star"}">${isFav ? "★" : "☆"}</button>
            </div>
            <div class="title">${escapeHtml(track.title)}</div>
            <div class="subtitle">${escapeHtml(track.artist)}</div>
          </div>
          <div class="right">
            <div class="cta" aria-hidden="true">▶</div>
            <div class="duration" data-role="duration">--:--</div>
            <div class="percent" data-role="percent">—</div>
          </div>
          <div class="progress-rail" aria-hidden="true"><div class="progress-fill" data-role="progress-fill"></div></div>
        `;
        btn.addEventListener("click", () => onSongTap(index));
        const starBtn = btn.querySelector('[data-role="star"]');
        if (starBtn) {
          starBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            toggleTrackFavorite(index);
          });
        }
        const media = btn.querySelector(".shield-slot");
        if (media && hasTrackArtwork(track)) {
          btn.classList.add("image-openable");
          media.title = "Open artwork";
          media.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            openImageModal(track);
          });
        }
        frag.appendChild(btn);
      });

      if (visible.length) {
        els.list.appendChild(frag);
      } else {
        const empty = document.createElement("div");
        empty.className = "song-card";
        empty.style.cursor = "default";
        empty.innerHTML = `
          <div class="shield-slot">
            ${songCardMediaHTML(0, null, false)}
          </div>
          <div class="meta">
            <div class="eyebrow"><span class="state-dot" aria-hidden="true"></span><span>No matches</span></div>
            <div class="title">No song found</div>
            <div class="subtitle">Try a shorter word like “Volholla” or “The”.</div>
          </div>
          <div class="right"><div class="cta" aria-hidden="true">?</div><div class="percent" data-role="percent">—</div></div>
          <div class="progress-rail" aria-hidden="true"><div class="progress-fill" data-role="progress-fill"></div></div>
        `;
        els.list.appendChild(empty);
      }

      updateVisibleCount();
      updateTopIdentity();
      refreshCards();
      const hasAllDurations = tracks.length > 0 && tracks.every((_, idx) => Number.isFinite(state.durationByIndex.get(trackCacheKey(idx))));
      if (!hasAllDurations) {
        preloadDurations();
      } else {
        tracks.forEach((_, idx) => {
          const dur = state.durationByIndex.get(trackCacheKey(idx));
          if (!Number.isFinite(dur)) return;
          const card = els.list.querySelector(`.song-card[data-index="${idx}"] [data-role="duration"]`);
          if (card) card.textContent = fmtTime(dur);
        });
      }
      updateCardProgressUI();
      scheduleSyncPlayerSpace();
    }

    function onSongTap(index) {
      vibrate(10);
      if (state.currentIndex === index) {
        if (els.audio.paused) {
          playCurrent();
        } else {
          els.audio.pause();
        }
        refreshCards();
        return;
      }
      loadTrack(index, true);
    }

    function loadTrack(index, autoplay = false) {
      if (index < 0 || index >= tracks.length) return;
      state.currentIndex = index;
      const track = tracks[index];
      els.audio.src = encodeURI(track.file);
      els.audio.load();
      updatePlayerHeader();
      refreshCards();
      if (autoplay) {
        playCurrent();
      }
    }

    async function playCurrent() {
      if (state.currentIndex < 0) {
        const queue = getQueueIndices();
        if (!queue.length) return;
        loadTrack(queue[0], true);
        return;
      }
      try {
        await els.audio.play();
      } catch (err) {
        console.warn("Playback blocked", err);
      }
      refreshCards();
      updatePlayerHeader();
    }

    function togglePlayPause() {
      vibrate(12);
      if (state.currentIndex < 0) {
        const queue = getQueueIndices();
        if (!queue.length) return;
        loadTrack(queue[0], true);
        return;
      }
      if (els.audio.paused) playCurrent();
      else els.audio.pause();
      refreshCards();
      updatePlayerHeader();
    }

    function prevTrack() {
      vibrate(12);
      advanceTrack(-1, true);
    }

    function nextTrack() {
      vibrate(12);
      advanceTrack(1, true);
    }

    function pickSequentialIndex(direction = 1, fromEnded = false) {
      const queue = getQueueIndices();
      if (!queue.length) return -1;
      if (state.currentIndex < 0) return queue[0];

      const pos = queue.indexOf(state.currentIndex);
      if (pos === -1) return direction > 0 ? queue[0] : queue[queue.length - 1];

      const nextPos = pos + direction;
      if (nextPos >= 0 && nextPos < queue.length) return queue[nextPos];

      if (state.loopAll) return direction > 0 ? queue[0] : queue[queue.length - 1];
      if (fromEnded) return -1;
      return queue[Math.max(0, Math.min(queue.length - 1, pos))];
    }

    function pickShuffleIndex(fromEnded = false) {
      const queue = getQueueIndices();
      if (!queue.length) return -1;
      if (state.currentIndex < 0) return queue[0];

      const choices = queue.filter((i) => i !== state.currentIndex);
      if (!choices.length) {
        return state.loopAll ? queue[0] : (fromEnded ? -1 : queue[0]);
      }
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function advanceTrack(direction = 1, userInitiated = false) {
      if (!tracks.length) return;
      const fromEnded = !userInitiated;
      const nextIndex = state.shuffle && direction > 0
        ? pickShuffleIndex(fromEnded)
        : pickSequentialIndex(direction, fromEnded);

      if (nextIndex === -1) {
        els.audio.pause();
        refreshCards();
        updatePlayerHeader();
        return;
      }

      if (nextIndex === state.currentIndex && userInitiated) {
        if (state.currentIndex < 0) loadTrack(0, true);
        else {
          els.audio.currentTime = 0;
          playCurrent();
        }
        return;
      }

      loadTrack(nextIndex, true);
    }

    function handleTrackEnded() {
      advanceTrack(1, false);
    }

    function toggleLoopAll() {
      state.loopAll = !state.loopAll;
      els.loopBtn.setAttribute("aria-pressed", String(state.loopAll));
      vibrate(8);
      updatePlayerHeader();
    }

    function toggleShuffle() {
      state.shuffle = !state.shuffle;
      els.shuffleBtn.setAttribute("aria-pressed", String(state.shuffle));
      vibrate(8);
      updatePlayerHeader();
    }

    function toggleFavoritesOnly() {
      state.favoritesOnly = !state.favoritesOnly;
      if (els.favFilterBtn) els.favFilterBtn.setAttribute("aria-pressed", String(state.favoritesOnly));
      vibrate(8);
      renderList();
      updatePlayerHeader();
    }

    function toggleTrackFavorite(index) {
      const track = tracks[index];
      if (!track) return;
      const key = trackFavoriteKey(track);
      if (!key) return;
      if (state.favorites.has(key)) state.favorites.delete(key);
      else state.favorites.add(key);
      saveFavoriteKeys();
      vibrate(8);

      if (state.favoritesOnly && !isFavoriteTrack(track)) {
        renderList();
        renderAreaTabs();
        updatePlayerHeader();
      } else {
        refreshCards();
        renderAreaTabs();
        updateVisibleCount();
        updatePlayerHeader();
      }
    }

    function exportFavorites() {
      const favorites = AREA_DEFS.flatMap((area) => area.tracks
        .filter((track) => isFavoriteTrack(track))
        .map((track) => ({
          album: area.label,
          title: track.title,
          artist: track.artist,
          file: track.file
        })));

      if (!favorites.length) {
        if (els.live) els.live.textContent = "No favorites to export yet.";
        vibrate(6);
        return;
      }

      const payload = {
        exported_at: new Date().toISOString(),
        count: favorites.length,
        favorites
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `volholla-favorites-${Date.now()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      if (els.live) els.live.textContent = `Exported ${favorites.length} favorites.`;
      vibrate(10);
    }

    function playAllFromStart() {
      vibrate(10);
      const queue = getQueueIndices();
      if (!queue.length) return;
      loadTrack(queue[0], true);
      const firstVisible = els.list.querySelector(`.song-card[data-index="${queue[0]}"]`);
      if (firstVisible) firstVisible.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function scrollToCurrent() {
      vibrate(8);
      if (state.currentIndex < 0) return;
      const currentCard = els.list.querySelector(`.song-card[data-index="${state.currentIndex}"]`);
      if (currentCard) {
        currentCard.scrollIntoView({ behavior: "smooth", block: "center" });
      } else {
        els.filterInput.value = "";
        state.filterQuery = "";
        renderList();
        requestAnimationFrame(() => {
          const card = els.list.querySelector(`.song-card[data-index="${state.currentIndex}"]`);
          if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
        });
      }
    }

    function refreshCards() {
      const cards = els.list.querySelectorAll(".song-card");
      cards.forEach((card) => {
        const actualIndex = Number(card.dataset.index);
        if (!Number.isFinite(actualIndex)) return;
        const playing = actualIndex === state.currentIndex;
        const activeAndPlaying = playing && !els.audio.paused;
        card.classList.toggle("playing", activeAndPlaying);
        const cta = card.querySelector(".cta");
        if (cta) cta.textContent = activeAndPlaying ? "⏸" : "▶";
        const mediaSlot = card.querySelector(".shield-slot");
        if (mediaSlot) mediaSlot.innerHTML = songCardMediaHTML(actualIndex, tracks[actualIndex], playing);
        const starBtn = card.querySelector('[data-role="star"]');
        if (starBtn) {
          const fav = isFavoriteTrack(tracks[actualIndex]);
          starBtn.classList.toggle("is-favorite", fav);
          starBtn.textContent = fav ? "★" : "☆";
          starBtn.setAttribute("aria-label", fav ? "Remove star" : "Star this song");
          starBtn.title = fav ? "Starred" : "Add star";
        }
      });
      setPlayPauseVisual(els.audio.paused);
      updateCardProgressUI();
      updateTopIdentity();
      updateUtilityButtons();
    }

    function updatePlayerHeader() {
      const idx = state.currentIndex;
      const hasTrack = idx >= 0;
      const playing = hasTrack && !els.audio.paused;
      const current = hasTrack ? tracks[idx] : null;
      const queue = getQueueIndices();
      const queueText = queue.length === tracks.length ? "all songs" : `${queue.length} filtered`;
      const area = getAreaDef();
      const modeBits = [
        state.loopAll ? "loop" : "stop at end",
        state.shuffle ? "shuffle" : "order"
      ];

      els.playerKicker.textContent = hasTrack
        ? `${area.label} · Shield ${String(idx + 1).padStart(2, "0")} of ${tracks.length}`
        : `${area.label} · Ready`;
      els.playerName.textContent = hasTrack ? current.title : "Tap any shield to play a song";
      els.playerHint.textContent = hasTrack
        ? `${current.artist} · ${playing ? "Now playing" : "Paused"} · ${modeBits.join(" / ")}`
        : `${queueText} · ${modeBits.join(" / ")}`;
      els.playerStatus.textContent = playing ? "Playing" : "Paused";
      els.playerShield.innerHTML = shieldSVG(Math.max(0, idx), hasTrack && playing, true, `player_${state.activeAreaKey}`);
      els.live.textContent = hasTrack ? `${current.title}. ${playing ? "Playing" : "Paused"}.` : "Player ready.";
      updateTopIdentity();
      updateUtilityButtons();
      scheduleSyncPlayerSpace();
    }

    function updateUtilityButtons() {
      const queue = getQueueIndices();
      els.loopBtn.setAttribute("aria-pressed", String(state.loopAll));
      els.loopBtn.title = state.loopAll ? "Loop all on" : "Loop all off";
      setBtnLabel(els.loopBtn, "↻", state.loopAll ? "On" : "Off");
      els.shuffleBtn.setAttribute("aria-pressed", String(state.shuffle));
      els.shuffleBtn.title = state.shuffle ? "Shuffle on" : "Shuffle off";
      setBtnLabel(els.shuffleBtn, "⇄", state.shuffle ? "On" : "Off");
      if (els.favFilterBtn) {
        els.favFilterBtn.setAttribute("aria-pressed", String(state.favoritesOnly));
        els.favFilterBtn.title = state.favoritesOnly ? "Favorites only on" : "Favorites only off";
        setBtnLabel(els.favFilterBtn, "★", state.favoritesOnly ? "On" : "Off");
      }
      if (els.exportFavsBtn) {
        const favCount = state.favorites.size;
        els.exportFavsBtn.disabled = favCount === 0;
        els.exportFavsBtn.title = favCount ? `Export ${favCount} starred songs` : "No starred songs yet";
        setBtnLabel(els.exportFavsBtn, "⤓", favCount ? String(favCount) : "0");
      }
      els.clearFilterBtn.disabled = !state.filterQuery.trim();
      els.jumpCurrentBtn.disabled = state.currentIndex < 0;
      els.jumpCurrentBtn.textContent = state.currentIndex >= 0 ? "Current" : "No Current";
      els.playAllBtn.disabled = queue.length === 0;
      setBtnLabel(
        els.playAllBtn,
        "▸|",
        state.filterQuery.trim()
          ? (queue.length ? String(queue.length) : "No Match")
          : "All"
      );
      if (els.bigTextBtn) setBtnLabel(els.bigTextBtn, "A", state.biggerText ? "Text+" : "Text");
    }

    function updateTimeUI() {
      const dur = els.audio.duration;
      const cur = els.audio.currentTime;
      if (!state.isSeeking) {
        if (Number.isFinite(dur) && dur > 0) {
          els.seekBar.value = String(Math.round((cur / dur) * 1000));
        } else {
          els.seekBar.value = "0";
        }
      }
      els.timeNow.textContent = fmtTime(cur);
      els.timeTotal.textContent = fmtTime(dur);
      updateCardProgressUI();
    }

    function preloadDurations() {
      const areaKey = state.activeAreaKey;
      const token = ++state.preloadToken;
      const localTracks = tracks.slice();
      localTracks.forEach((track, index) => {
        const temp = new Audio();
        temp.preload = "metadata";
        temp.src = encodeURI(track.file);
        temp.addEventListener("loadedmetadata", () => {
          if (token !== state.preloadToken) return;
          if (Number.isFinite(temp.duration)) {
            state.durationByIndex.set(trackCacheKey(index, areaKey), temp.duration);
            if (state.activeAreaKey !== areaKey) return;
            const card = els.list.querySelector(`.song-card[data-index="${index}"] [data-role="duration"]`);
            if (card) card.textContent = fmtTime(temp.duration);
          }
          temp.src = "";
        }, { once: true });
        temp.addEventListener("error", () => {
          if (token !== state.preloadToken || state.activeAreaKey !== areaKey) return;
          const card = els.list.querySelector(`.song-card[data-index="${index}"] [data-role="duration"]`);
          if (card) card.textContent = "--:--";
        }, { once: true });
      });
    }

    function toggleBigText() {
      state.biggerText = !state.biggerText;
      document.body.classList.toggle("big-text", state.biggerText);
      if (els.bigTextBtn) {
        els.bigTextBtn.setAttribute("aria-pressed", String(state.biggerText));
        setBtnLabel(els.bigTextBtn, "A", state.biggerText ? "Text+" : "Text");
      }
      vibrate(8);
      scheduleSyncPlayerSpace();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[m]));
    }

    els.playPauseBtn.addEventListener("click", togglePlayPause);
    els.prevBtn.addEventListener("click", prevTrack);
    els.nextBtn.addEventListener("click", nextTrack);
    els.playAllBtn.addEventListener("click", playAllFromStart);
    if (els.shareAlbumBtn) els.shareAlbumBtn.addEventListener("click", shareCurrentAlbumPage);
    if (els.songPageBtn) els.songPageBtn.addEventListener("click", () => {
      openCurrentSongPage();
      closeSongLinkMenu();
    });
    if (els.shareSongBtn) els.shareSongBtn.addEventListener("click", async () => {
      await shareCurrentSongPage();
      closeSongLinkMenu();
    });
    if (els.copySongBtn) els.copySongBtn.addEventListener("click", async () => {
      await copyCurrentSongUrl();
      closeSongLinkMenu();
    });
    if (els.copySongEmbedBtn) els.copySongEmbedBtn.addEventListener("click", async () => {
      await copyCurrentSongEmbed();
      closeSongLinkMenu();
    });
    if (els.bigTextBtn) els.bigTextBtn.addEventListener("click", toggleBigText);
    els.loopBtn.addEventListener("click", toggleLoopAll);
    els.shuffleBtn.addEventListener("click", toggleShuffle);
    if (els.favFilterBtn) els.favFilterBtn.addEventListener("click", toggleFavoritesOnly);
    if (els.exportFavsBtn) els.exportFavsBtn.addEventListener("click", exportFavorites);
    els.jumpCurrentBtn.addEventListener("click", scrollToCurrent);
    els.clearFilterBtn.addEventListener("click", () => {
      els.filterInput.value = "";
      state.filterQuery = "";
      renderList();
      els.filterInput.focus();
      vibrate(8);
    });
    els.filterInput.addEventListener("input", () => {
      state.filterQuery = els.filterInput.value;
      renderList();
    });

    els.seekBar.addEventListener("pointerdown", () => { state.isSeeking = true; });
    els.seekBar.addEventListener("pointerup", () => { state.isSeeking = false; });
    els.seekBar.addEventListener("input", () => {
      state.isSeeking = true;
      const dur = els.audio.duration;
      if (!Number.isFinite(dur) || dur <= 0) return;
      const target = (Number(els.seekBar.value) / 1000) * dur;
      els.timeNow.textContent = fmtTime(target);
    });
    els.seekBar.addEventListener("change", () => {
      const dur = els.audio.duration;
      if (!Number.isFinite(dur) || dur <= 0) {
        state.isSeeking = false;
        return;
      }
      els.audio.currentTime = (Number(els.seekBar.value) / 1000) * dur;
      state.isSeeking = false;
    });

    els.audio.addEventListener("timeupdate", updateTimeUI);
    els.audio.addEventListener("loadedmetadata", () => {
      updateTimeUI();
      if (state.currentIndex >= 0 && Number.isFinite(els.audio.duration)) {
        state.durationByIndex.set(trackCacheKey(state.currentIndex), els.audio.duration);
        const card = els.list.querySelector(`.song-card[data-index="${state.currentIndex}"] [data-role="duration"]`);
        if (card) card.textContent = fmtTime(els.audio.duration);
      }
    });
    els.audio.addEventListener("play", () => { refreshCards(); updatePlayerHeader(); });
    els.audio.addEventListener("pause", () => { refreshCards(); updatePlayerHeader(); });
    els.audio.addEventListener("ended", handleTrackEnded);
    els.audio.addEventListener("error", () => {
      els.playerStatus.textContent = "Error";
      els.playerHint.textContent = "Could not load file";
    });

    if (els.imageModalClose) els.imageModalClose.addEventListener("click", closeImageModal);
    if (els.imageModal) {
      els.imageModal.addEventListener("click", (e) => {
        if (e.target === els.imageModal) closeImageModal();
      });
    }
    if (els.imageModalBackdrop) {
      els.imageModalBackdrop.addEventListener("click", (e) => {
        if (e.target === els.imageModalBackdrop) closeImageModal();
      });
    }
    document.addEventListener("click", (e) => {
      if (!els.songLinkMenu?.open) return;
      if (!els.songLinkMenu.contains(e.target)) closeSongLinkMenu();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && els.imageModal?.classList.contains("show")) {
        closeImageModal();
      }
      if (e.key === "Escape" && els.songLinkMenu?.open) {
        closeSongLinkMenu();
      }
    });

    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => scheduleSyncPlayerSpace());
      ro.observe(els.player);
    }
    if (els.finderWrap) els.finderWrap.addEventListener("toggle", scheduleSyncPlayerSpace);
    if (els.playerExtra) els.playerExtra.addEventListener("toggle", scheduleSyncPlayerSpace);
    window.addEventListener("resize", syncResponsivePanels);

    setActiveArea(getInitialAreaKeyFromUrl());
    syncResponsivePanels();
  </script>
</body>
</html>
