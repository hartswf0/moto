<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOLHOLLA Shields</title>
  <link rel="icon" href='data:image/svg+xml;utf8,
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <path d="M100 20 Q140 40 170 60 Q170 120 140 160 Q100 180 60 160 Q30 120 30 60 Q60 40 100 20 Z" fill="%230e0e0e" stroke="%23ff8a00" stroke-width="10"/>
    </svg>' />
  <style>
    :root {
      --bg: #0d0d0f;
      --panel: #17171b;
      --panel-2: #1e1f24;
      --text: #f3f0e9;
      --muted: #bdb6a7;
      --fire: #ff7a16;
      --ember: #ffb761;
      --steel: #c4c7cf;
      --line: rgba(255,255,255,0.08);
      --shadow: rgba(0,0,0,0.45);
      --safe-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
      --ui-scale: 1;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 600px at 50% -15%, rgba(255,122,22,0.20), transparent 60%),
        linear-gradient(180deg, #151519 0%, #0c0c0f 100%);
      min-height: 100vh;
      --header-h: calc(84px * var(--ui-scale));
      --player-h: calc(188px * var(--ui-scale));
    }

    body.big-text { --ui-scale: 1.15; }

    .page {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 12px calc(var(--player-h) + var(--safe-bottom) + 18px);
    }

    .topbar {
      position: static;
      z-index: 20;
      padding: 8px 0 6px;
      background: linear-gradient(180deg, rgba(13,13,15,0.96), rgba(13,13,15,0.86));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .topbar-card {
      background: linear-gradient(180deg, rgba(28,28,33,0.96), rgba(18,18,22,0.96));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 24px var(--shadow);
      padding: 12px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand .mini-shield {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      filter: drop-shadow(0 3px 0 rgba(0,0,0,0.35));
    }

    .brand-title {
      line-height: 1;
      min-width: 0;
    }

    .brand-title strong {
      display: block;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: calc(0.95rem * var(--ui-scale));
    }

    .mini-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: calc(0.76rem * var(--ui-scale));
      font-weight: 700;
      min-height: 34px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .finder-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .area-row {
      display: grid;
      gap: 6px;
      margin-bottom: 8px;
    }

    .area-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 4px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }

    .area-strip::-webkit-scrollbar {
      height: 6px;
    }

    .area-strip::-webkit-scrollbar-thumb {
      background: #343741;
      border-radius: 999px;
    }

    .area-card {
      flex: 0 0 auto;
      scroll-snap-align: start;
      width: 220px;
      min-height: 78px;
      border-radius: 14px;
      border: 1px solid #000;
      background: linear-gradient(180deg, #272932, #1f2027);
      color: var(--text);
      padding: 8px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.45);
      cursor: pointer;
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 9px;
      align-items: center;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .area-card::before {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 3px;
      background: linear-gradient(90deg, var(--area-a, #ff8a00), var(--area-b, #ffb761));
      opacity: 0.85;
    }

    .area-card .thumb {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
    }

    .area-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .area-card .thumb .thumb-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 120% at 20% 10%, color-mix(in srgb, var(--area-a, #ff8a00) 35%, transparent), transparent 65%),
        linear-gradient(160deg, #22242b, #17181d);
      color: var(--area-b, #ffb761);
      font-weight: 900;
      font-size: calc(0.9rem * var(--ui-scale));
      letter-spacing: 0.08em;
    }

    .area-card .meta {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .area-card .name {
      font-weight: 900;
      font-size: calc(0.84rem * var(--ui-scale));
      line-height: 1.05;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .area-card .sub {
      color: var(--muted);
      font-size: calc(0.72rem * var(--ui-scale));
      line-height: 1.12;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .area-card .count {
      color: var(--area-b, #ffb761);
      font-size: calc(0.7rem * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .area-card[aria-pressed="true"] {
      background: linear-gradient(180deg, #ffd28a, #ffb761);
      color: #241400;
      outline: 2px solid rgba(255,183,97,0.25);
      outline-offset: 1px;
    }

    .area-card[aria-pressed="true"] .sub {
      color: #4a2d05;
    }

    .area-card[aria-pressed="true"] .count {
      color: #4a2d05;
    }

    .area-card[aria-pressed="true"] .thumb {
      border-color: rgba(66,42,10,0.16);
    }

    .finder-input {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #23252c, #1b1c22);
      color: var(--text);
      padding: 0 12px;
      font-size: calc(0.9rem * var(--ui-scale));
      outline: none;
    }

    .finder-input::placeholder {
      color: #9ca0ab;
    }

    .finder-input:focus-visible {
      border-color: rgba(255,183,97,0.75);
      box-shadow: 0 0 0 2px rgba(255,183,97,0.18);
    }

    .finder-wrap {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      overflow: clip;
    }

    .finder-wrap > summary {
      list-style: none;
      cursor: pointer;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      color: var(--muted);
      font-size: calc(0.82rem * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .finder-wrap > summary::-webkit-details-marker { display: none; }
    .finder-wrap > summary::after {
      content: "▾";
      color: var(--ember);
      font-size: 0.95em;
    }
    .finder-wrap[open] > summary::after { content: "▴"; }
    .finder-wrap[open] > summary {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .finder-wrap .finder-row {
      padding: 8px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid #000;
      background: linear-gradient(180deg, #26272e, #1d1e24);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: calc(0.84rem * var(--ui-scale));
      min-height: 44px;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.55);
    }

    .pill.fire {
      background: linear-gradient(180deg, #ff9a3d, #ff7616);
      color: #1c0f00;
    }

    .pill[aria-pressed="true"] {
      outline: 2px solid var(--ember);
      outline-offset: 1px;
    }

    .pill:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: 1px 1px 0 rgba(0,0,0,0.45);
    }

    .song-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .song-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(28,29,34,0.95), rgba(18,18,22,0.95));
      box-shadow: 0 10px 18px rgba(0,0,0,0.26);
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(96px, 108px) 1fr auto;
      gap: 12px;
      align-items: center;
      text-align: left;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
      min-height: 126px;
      touch-action: manipulation;
      scroll-margin-top: 88px;
      scroll-margin-bottom: calc(var(--player-h) + 28px);
    }

    .song-card:active { transform: translateY(1px) scale(0.998); }
    .song-card:focus-visible {
      outline: 3px solid var(--ember);
      outline-offset: 2px;
    }

    .song-card.playing {
      border-color: rgba(255,183,97,0.75);
      background:
        radial-gradient(400px 180px at 10% 50%, rgba(255,122,22,0.12), transparent 70%),
        linear-gradient(180deg, rgba(35,30,24,0.98), rgba(22,20,19,0.98));
    }

    .song-card .shield-slot {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .song-card .shield-svg {
      width: 94px;
      height: 94px;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.38));
    }

    .song-card .meta {
      min-width: 0;
    }

    .song-card .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: calc(0.78rem * var(--ui-scale));
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .song-card .state-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #41444b;
      box-shadow: inset 0 0 0 1px #000;
      flex: 0 0 auto;
    }

    .song-card.playing .state-dot {
      background: var(--fire);
      box-shadow: 0 0 12px rgba(255,122,22,0.65), inset 0 0 0 1px #000;
    }

    .song-card .title {
      font-size: calc(1.08rem * var(--ui-scale));
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .song-card .subtitle {
      color: var(--muted);
      font-size: calc(0.82rem * var(--ui-scale));
      line-height: 1.2;
    }

    .song-card .right {
      display: grid;
      gap: 6px;
      justify-items: end;
      align-content: center;
      min-width: 72px;
    }

    .song-card .duration,
    .song-card .tap-hint {
      font-size: calc(0.78rem * var(--ui-scale));
      color: var(--muted);
      white-space: nowrap;
    }

    .song-card .cta {
      min-width: 70px;
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid #000;
      background: linear-gradient(180deg, #ff9b40, #ff7616);
      color: #1d1002;
      font-weight: 900;
      font-size: calc(0.84rem * var(--ui-scale));
      padding: 8px 10px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.55);
      display: grid;
      place-items: center;
    }

    .song-card.playing .cta {
      background: linear-gradient(180deg, #ffd28a, #ffb761);
      color: #221300;
    }

    .player {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: var(--safe-bottom);
      z-index: 40;
      background:
        radial-gradient(500px 140px at 15% 0%, rgba(255,122,22,0.13), transparent 65%),
        linear-gradient(180deg, rgba(28,28,34,0.98), rgba(18,18,22,0.98));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      box-shadow: 0 16px 30px rgba(0,0,0,0.42);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .player-top {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .player-shield {
      width: 58px;
      height: 58px;
      display: block;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,0.35));
    }

    .player-meta {
      min-width: 0;
    }

    .player-meta .kicker {
      color: var(--muted);
      font-size: calc(0.74rem * var(--ui-scale));
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .player-meta .name {
      font-size: calc(1rem * var(--ui-scale));
      font-weight: 800;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .player-meta .hint {
      font-size: calc(0.76rem * var(--ui-scale));
      color: var(--muted);
      margin-top: 3px;
    }

    .player-status {
      color: var(--ember);
      font-size: calc(0.78rem * var(--ui-scale));
      font-weight: 800;
      text-align: right;
      min-width: 62px;
    }

    .transport {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .transport button {
      min-height: 52px;
      border-radius: 14px;
      border: 1px solid #000;
      background: linear-gradient(180deg, #282a32, #1f2027);
      color: var(--text);
      font-size: calc(0.98rem * var(--ui-scale));
      font-weight: 900;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
      cursor: pointer;
      touch-action: manipulation;
    }

    .transport button:active { transform: translateY(1px); }

    .transport .play {
      background: linear-gradient(180deg, #ff9c41, #ff7616);
      color: #1d1002;
      font-size: calc(1.05rem * var(--ui-scale));
    }

    .player-tools {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .tool-btn {
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid #000;
      background: linear-gradient(180deg, #2a2c33, #1f2027);
      color: var(--text);
      font-size: calc(0.8rem * var(--ui-scale));
      font-weight: 800;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.45);
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .tool-btn:active { transform: translateY(1px); }

    .tool-btn[aria-pressed="true"] {
      background: linear-gradient(180deg, #ffd28a, #ffb761);
      color: #241400;
    }

    .tool-btn:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: 1px 1px 0 rgba(0,0,0,0.45);
    }

    .tool-btn.fire {
      background: linear-gradient(180deg, #ff9b40, #ff7616);
      color: #1d1002;
    }

    .player-extra {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      overflow: clip;
    }

    .player-extra > summary {
      list-style: none;
      min-height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      color: var(--muted);
      font-size: calc(0.76rem * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid transparent;
    }

    .player-extra > summary::-webkit-details-marker { display: none; }
    .player-extra > summary::after {
      content: "▾";
      color: var(--ember);
      font-size: 0.95em;
    }
    .player-extra[open] > summary::after { content: "▴"; }
    .player-extra[open] > summary {
      border-bottom-color: rgba(255,255,255,0.05);
    }

    .player-extra-inner {
      padding: 8px 8px 8px;
    }

    .seek-block {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: calc(0.78rem * var(--ui-scale));
      color: var(--muted);
      min-width: 42px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 34px;
      background: transparent;
      margin: 0;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2a2c33, #1e2026);
      border: 1px solid #000;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      margin-top: -10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffd08f, #ff9d42 55%, #ff7616 100%);
      border: 2px solid #090909;
      box-shadow: 0 3px 0 rgba(0,0,0,0.45);
    }

    input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2a2c33, #1e2026);
      border: 1px solid #000;
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffd08f, #ff9d42 55%, #ff7616 100%);
      border: 2px solid #090909;
      box-shadow: 0 3px 0 rgba(0,0,0,0.45);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 700px) {
      .topbar {
        position: sticky;
        top: 0;
      }
      .song-list {
        grid-template-columns: 1fr 1fr;
      }
      .finder-wrap {
        border: 0;
        background: transparent;
        border-radius: 0;
      }
      .finder-wrap > summary {
        display: none;
      }
      .finder-wrap .finder-row {
        padding: 0;
      }
      .player-extra {
        border: 0;
        background: transparent;
        border-radius: 0;
      }
      .player-extra > summary {
        display: none;
      }
      .player-extra-inner {
        padding: 0;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        border-bottom: 0;
        padding-top: 6px;
      }
      .topbar-card { padding: 10px; }
      .brand-row { margin-bottom: 8px; }
      .brand .mini-shield { width: 30px; height: 30px; }
      .mini-count { min-height: 30px; padding: 4px 8px; }
      .area-row { margin-bottom: 6px; }
      .area-card {
        width: 202px;
        min-height: 74px;
        grid-template-columns: 56px 1fr;
        padding: 7px;
      }
      .area-card .thumb {
        width: 56px;
        height: 56px;
      }
      .area-card .name {
        font-size: calc(0.78rem * var(--ui-scale));
      }
      .area-card .sub {
        font-size: calc(0.68rem * var(--ui-scale));
      }
      .finder-row {
        grid-template-columns: 1fr auto;
      }
      .finder-row .top-actions {
        grid-column: 1 / -1;
        justify-content: stretch;
      }
      .finder-row .top-actions .pill {
        flex: 1 1 0;
        min-width: 0;
      }
      .song-card {
        grid-template-columns: 92px 1fr;
        grid-template-areas:
          "shield meta"
          "shield right";
        align-items: start;
      }
      .song-card .shield-slot { grid-area: shield; }
      .song-card .meta { grid-area: meta; }
      .song-card .right {
        grid-area: right;
        justify-items: start;
        grid-auto-flow: column;
        gap: 10px;
      }
      .song-card .duration { order: 2; }
      .song-card .tap-hint { display: none; }
      .player-top {
        grid-template-columns: 52px 1fr;
        grid-template-areas:
          "shield meta"
          "status status";
      }

  <script>
    function titleFromFilename(file) {
      return file
        .replace(/^.*\//, "")
        .replace(/\.mp3$/i, "")
        .replace(/^\d+_/, "")
        .replace(/^coolradio\s*-\s*/i, "")
        .replace(/\s*-\s*Sonauto$/i, "")
        .trim();
    }

    function buildTracks(area, artist = "coolradio") {
      return area.files.map((name, index) => {
        const title = titleFromFilename(name);
        return {
          file: `${area.basePath}${name}`,
          title,
          artist,
          areaKey: area.key,
          art: area.trackArtByTitle?.[title] || area.trackArtByIndex?.[index] || null
        };
      });
    }

    function makeCoverSVGDataURI(label, a, b, glyph = "◈") {

    let tracks = [];

    const state = {

    const els = {

    };

    function vibrate(ms = 12) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function fmtTime(sec) {
      if (!Number.isFinite(sec) || sec < 0) return "0:00";
      const s = Math.floor(sec);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, "0")}`;
    }

    function getAreaDef(key = state.activeAreaKey) {
      return AREA_DEFS.find((a) => a.key === key) || AREA_DEFS[0];
    }

    function trackCacheKey(index, areaKey = state.activeAreaKey) {
      return `${areaKey}:${index}`;
    }

    function setActiveArea(areaKey, opts = {}) {
      const area = getAreaDef(areaKey);
      const changed = area.key !== state.activeAreaKey;
      state.activeAreaKey = area.key;
      tracks = area.tracks;
      if (els.filterInput) {
        els.filterInput.placeholder = `Find in ${area.label.toLowerCase()}...`;
      }
      if (changed) {
        state.currentIndex = -1;
        state.isSeeking = false;
        state.filterQuery = "";
        els.filterInput.value = "";
        els.audio.pause();
        els.audio.currentTime = 0;
        els.seekBar.value = "0";
        els.timeNow.textContent = "0:00";
        els.timeTotal.textContent = "0:00";
      }
      renderAreaTabs();
      renderList();
      updatePlayerHeader();
      updateTimeUI();
      scheduleSyncPlayerSpace();
      if (opts.playFirst) playAllFromStart();
    }

    function renderAreaTabs() {
      if (!els.areaStrip) return;
      els.areaStrip.innerHTML = "";
      const frag = document.createDocumentFragment();
      AREA_DEFS.forEach((area) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "area-card";
        btn.setAttribute("aria-pressed", String(area.key === state.activeAreaKey));
        btn.setAttribute("aria-label", `Open ${area.label}, ${area.tracks.length} songs`);
        btn.style.setProperty("--area-a", area.accentA || "#ff8a00");
        btn.style.setProperty("--area-b", area.accentB || "#ffb761");
        btn.innerHTML = `
          <div class="thumb">${areaThumbHTML(area)}</div>
          <div class="meta">
            <div class="name">${escapeHtml(area.label)}</div>
            <div class="count">${area.tracks.length} shields</div>
            <div class="sub">${escapeHtml(area.description || "")}</div>
          </div>
        `;
        btn.addEventListener("click", () => {
          vibrate(8);
          setActiveArea(area.key);
        });
        frag.appendChild(btn);
      });
      els.areaStrip.appendChild(frag);
    }

    function trackMatchesFilter(track, query) {
      const q = query.trim().toLowerCase();
      if (!q) return true;
      return `${track.title} ${track.artist}`.toLowerCase().includes(q);
    }

    function getVisibleTrackIndices() {
      const out = [];
      tracks.forEach((track, index) => {
        if (trackMatchesFilter(track, state.filterQuery)) out.push(index);
      });
      return out;
    }

    function getQueueIndices() {
      return getVisibleTrackIndices();
    }

    function updateVisibleCount() {
      const count = getVisibleTrackIndices().length;
      const area = getAreaDef();
      els.visibleCount.textContent = state.filterQuery.trim()
        ? `${area.label} · ${count}/${tracks.length}`
        : `${area.label} · ${tracks.length}`;
    }

    function syncPlayerSpace() {
      const h = Math.ceil(els.player.getBoundingClientRect().height || 0);
      if (h > 0) document.body.style.setProperty("--player-h", `${h}px`);
    }

    let syncPlayerSpaceRAF = 0;
    function scheduleSyncPlayerSpace() {
      if (syncPlayerSpaceRAF) cancelAnimationFrame(syncPlayerSpaceRAF);
      syncPlayerSpaceRAF = requestAnimationFrame(() => {
        syncPlayerSpaceRAF = 0;
        syncPlayerSpace();
      });
    }

    function syncResponsivePanels() {
      const mobile = window.matchMedia("(max-width: 700px)").matches;
      if (mobile) {
        if (!state._mobilePanelsInit) {
          if (els.finderWrap) els.finderWrap.open = false;
          if (els.playerExtra) els.playerExtra.open = false;
          state._mobilePanelsInit = true;
        }
      } else {
        if (els.finderWrap) els.finderWrap.open = true;
        if (els.playerExtra) els.playerExtra.open = true;
        state._mobilePanelsInit = false;
      }
      scheduleSyncPlayerSpace();
    }

    function areaThumbHTML(area) {
      if (area.coverImage) {
        return `<img src="${escapeHtml(encodeURI(area.coverImage))}" alt="" loading="lazy" decoding="async">`;
      }
      return `<div class="thumb-fallback">${escapeHtml((area.label || "?").slice(0, 1))}</div>`;
    }

    function shieldSVG(index, active = false, small = false, instanceId = "shield") {
      const motifs = ["line", "ring", "chev", "hammer", "bars", "vmark"];
      const motif = motifs[index % motifs.length];
      const area = getAreaDef();
      const track = tracks[index];
      const baseStroke = active ? "#ffd08c" : (area.accentA || "#ff8a00");
      const accent = active ? "#ffd08c" : (area.accentB || "#ffb761");
      const fill = active ? "#24170b" : "#141418";
      const glow = active
        ? "drop-shadow(0 0 10px rgba(255,183,97,.45)) drop-shadow(0 5px 0 rgba(0,0,0,.35))"
        : "drop-shadow(0 5px 0 rgba(0,0,0,.35))";
      const numSize = small ? 26 : 30;
      const ringR = small ? 43 : 46;
      const ringCx = 100;
      const ringCy = small ? 93 : 95;
      const clipId = `clip_${String(instanceId).replace(/[^a-zA-Z0-9_-]/g, "_")}`;
      const artUrl = track?.art ? encodeURI(track.art) : null;
      const artSize = ringR * 2;
      const artX = ringCx - ringR;
      const artY = ringCy - ringR;

      let motifMarkup = "";
      if (motif === "line") motifMarkup = `<line x1="100" y1="56" x2="100" y2="142" stroke="${accent}" stroke-width="8"/><line x1="64" y1="100" x2="136" y2="100" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "ring") motifMarkup = `<circle cx="100" cy="100" r="34" fill="none" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "chev") motifMarkup = `<polyline points="66,118 100,84 134,118" fill="none" stroke="${accent}" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><polyline points="72,96 100,68 128,96" fill="none" stroke="${accent}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>`;
      if (motif === "hammer") motifMarkup = `<line x1="72" y1="78" x2="128" y2="78" stroke="${accent}" stroke-width="8"/><line x1="100" y1="78" x2="100" y2="138" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "bars") motifMarkup = `<line x1="74" y1="120" x2="90" y2="120" stroke="${accent}" stroke-width="8"/><line x1="90" y1="102" x2="118" y2="102" stroke="${accent}" stroke-width="8"/><line x1="82" y1="84" x2="138" y2="84" stroke="${accent}" stroke-width="8"/>`;
      if (motif === "vmark") motifMarkup = `<path d="M66 80 L100 126 L134 80" fill="none" stroke="${accent}" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>`;

      const artMarkup = artUrl ? `
          <defs>
            <clipPath id="${clipId}">
              <circle cx="${ringCx}" cy="${ringCy}" r="${ringR}"></circle>
            </clipPath>
          </defs>
          <circle cx="${ringCx}" cy="${ringCy}" r="${ringR + 2}" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="2"></circle>
          <image href="${escapeHtml(artUrl)}" x="${artX}" y="${artY}" width="${artSize}" height="${artSize}" preserveAspectRatio="xMidYMid slice" clip-path="url(#${clipId})" opacity="${active ? "0.98" : "0.90"}"></image>
          <circle cx="${ringCx}" cy="${ringCy}" r="${ringR}" fill="none" stroke="${accent}" stroke-width="3" opacity="0.95"></circle>
      ` : `<circle cx="100" cy="100" r="56" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>`;

      return `
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;filter:${glow}">
          <defs>
            <linearGradient id="shieldGrad_${clipId}" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${active ? "#2b1d10" : "#1a1b20"}"></stop>
              <stop offset="100%" stop-color="${active ? "#17120f" : "#111216"}"></stop>
            </linearGradient>
          </defs>
          <path d="M100 20 Q140 40 170 60 Q170 120 140 160 Q100 180 60 160 Q30 120 30 60 Q60 40 100 20 Z"
                fill="url(#shieldGrad_${clipId})" stroke="${baseStroke}" stroke-width="8"/>
          <path d="M100 30 Q132 46 156 62 Q156 112 132 146 Q100 164 68 146 Q44 112 44 62 Q68 46 100 30 Z"
                fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
          ${artMarkup}
          <g opacity="${artUrl ? "0.78" : "1"}">${motifMarkup}</g>
          <text x="100" y="160" fill="${accent}" font-size="${numSize}" font-weight="800" text-anchor="middle" font-family="ui-sans-serif, system-ui">${String(index + 1).padStart(2, "0")}</text>
        </svg>`;
    }

    function renderList() {
      els.list.innerHTML = "";
      const frag = document.createDocumentFragment();
      const visible = getVisibleTrackIndices();

      visible.forEach((index) => {
        const track = tracks[index];

        empty.style.cursor = "default";
        empty.innerHTML = `
          <div class="shield-slot"><div class="shield-svg">${shieldSVG(0, false, false, `empty_${state.activeAreaKey}`)}</div></div>
          <div class="meta">
            <div class="eyebrow"><span class="state-dot" aria-hidden="true"></span><span>No matches</span></div>
            <div class="title">No song found</div>
            <div class="subtitle">Try a shorter word like “Volholla” or “The”.</div>
          </div>
          <div class="right"><div class="cta" aria-hidden="true">Find</div></div>
        `;
        els.list.appendChild(empty);
      }

      updateVisibleCount();
      refreshCards();
      const hasAllDurations = tracks.length > 0 && tracks.every((_, idx) => Number.isFinite(state.durationByIndex.get(trackCacheKey(idx))));
      if (!hasAllDurations) {
        preloadDurations();
      } else {
        tracks.forEach((_, idx) => {
          const dur = state.durationByIndex.get(trackCacheKey(idx));
          if (!Number.isFinite(dur)) return;
          const card = els.list.querySelector(`.song-card[data-index="${idx}"] [data-role="duration"]`);
          if (card) card.textContent = fmtTime(dur);
        });
      }
      scheduleSyncPlayerSpace();
    }

    function onSongTap(index) {
      vibrate(10);
      if (state.currentIndex === index) {
        if (els.audio.paused) {
          playCurrent();
        } else {
          els.audio.pause();
        }
        refreshCards();
        return;
      }
      loadTrack(index, true);
    }

    function loadTrack(index, autoplay = false) {
      if (index < 0 || index >= tracks.length) return;
      state.currentIndex = index;
      const track = tracks[index];
      els.audio.src = encodeURI(track.file);
      els.audio.load();
      updatePlayerHeader();
      refreshCards();
      if (autoplay) {
        playCurrent();
      }
    }

    async function playCurrent() {
      if (state.currentIndex < 0) {
        const queue = getQueueIndices();
        if (!queue.length) return;
        loadTrack(queue[0], true);
        return;
      }
      try {
        await els.audio.play();
      } catch (err) {
        console.warn("Playback blocked", err);
      }
      refreshCards();
      updatePlayerHeader();
    }

    function togglePlayPause() {
      vibrate(12);
      if (state.currentIndex < 0) {
        const queue = getQueueIndices();
        if (!queue.length) return;
        loadTrack(queue[0], true);
        return;
      }
      if (els.audio.paused) playCurrent();
      else els.audio.pause();
      refreshCards();
      updatePlayerHeader();
    }

    function prevTrack() {
      vibrate(12);
      advanceTrack(-1, true);
    }

    function nextTrack() {
      vibrate(12);
      advanceTrack(1, true);
    }

    function pickSequentialIndex(direction = 1, fromEnded = false) {
      const queue = getQueueIndices();
      if (!queue.length) return -1;
      if (state.currentIndex < 0) return queue[0];

      const pos = queue.indexOf(state.currentIndex);
      if (pos === -1) return direction > 0 ? queue[0] : queue[queue.length - 1];

      const nextPos = pos + direction;
      if (nextPos >= 0 && nextPos < queue.length) return queue[nextPos];

      if (state.loopAll) return direction > 0 ? queue[0] : queue[queue.length - 1];
      if (fromEnded) return -1;
      return queue[Math.max(0, Math.min(queue.length - 1, pos))];
    }

    function pickShuffleIndex(fromEnded = false) {
      const queue = getQueueIndices();
      if (!queue.length) return -1;
      if (state.currentIndex < 0) return queue[0];

      const choices = queue.filter((i) => i !== state.currentIndex);
      if (!choices.length) {
        return state.loopAll ? queue[0] : (fromEnded ? -1 : queue[0]);
      }
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function advanceTrack(direction = 1, userInitiated = false) {
      if (!tracks.length) return;
      const fromEnded = !userInitiated;
      const nextIndex = state.shuffle && direction > 0
        ? pickShuffleIndex(fromEnded)
        : pickSequentialIndex(direction, fromEnded);

      if (nextIndex === -1) {
        els.audio.pause();
        refreshCards();
        updatePlayerHeader();
        return;
      }

      if (nextIndex === state.currentIndex && userInitiated) {
        if (state.currentIndex < 0) loadTrack(0, true);
        else {
          els.audio.currentTime = 0;
          playCurrent();
        }
        return;
      }

      loadTrack(nextIndex, true);
    }

    function handleTrackEnded() {
      advanceTrack(1, false);
    }

    function toggleLoopAll() {
      state.loopAll = !state.loopAll;
      els.loopBtn.setAttribute("aria-pressed", String(state.loopAll));
      els.loopBtn.textContent = state.loopAll ? "Loop All" : "No Loop";
      vibrate(8);
      updatePlayerHeader();
    }

    function toggleShuffle() {
      state.shuffle = !state.shuffle;
      els.shuffleBtn.setAttribute("aria-pressed", String(state.shuffle));
      els.shuffleBtn.textContent = state.shuffle ? "Shuffle On" : "Shuffle";
      vibrate(8);
      updatePlayerHeader();
    }

    function playAllFromStart() {
      vibrate(10);
      const queue = getQueueIndices();
      if (!queue.length) return;
      loadTrack(queue[0], true);
      const firstVisible = els.list.querySelector(`.song-card[data-index="${queue[0]}"]`);
      if (firstVisible) firstVisible.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function scrollToCurrent() {
      vibrate(8);
      if (state.currentIndex < 0) return;
      const currentCard = els.list.querySelector(`.song-card[data-index="${state.currentIndex}"]`);
      if (currentCard) {
        currentCard.scrollIntoView({ behavior: "smooth", block: "center" });
      } else {
        els.filterInput.value = "";
        state.filterQuery = "";
        renderList();
        requestAnimationFrame(() => {
          const card = els.list.querySelector(`.song-card[data-index="${state.currentIndex}"]`);
          if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
        });
      }
    }

    function refreshCards() {
      const cards = els.list.querySelectorAll(".song-card");
      cards.forEach((card) => {
        const actualIndex = Number(card.dataset.index);
        if (!Number.isFinite(actualIndex)) return;
        const playing = actualIndex === state.currentIndex;
        const activeAndPlaying = playing && !els.audio.paused;
        card.classList.toggle("playing", activeAndPlaying);
        const cta = card.querySelector(".cta");
        if (cta) cta.textContent = activeAndPlaying ? "Pause" : (playing ? "Resume" : "Play");
        const shieldEl = card.querySelector(".shield-svg");
        if (shieldEl) shieldEl.innerHTML = shieldSVG(actualIndex, playing, false, `card_${state.activeAreaKey}_${actualIndex}`);
      });
      els.playPauseBtn.textContent = els.audio.paused ? "Play" : "Pause";
      updateUtilityButtons();
    }

    function updatePlayerHeader() {
      const idx = state.currentIndex;
      const hasTrack = idx >= 0;
      const playing = hasTrack && !els.audio.paused;
      const current = hasTrack ? tracks[idx] : null;
      const queue = getQueueIndices();
      const queueText = queue.length === tracks.length ? "all songs" : `${queue.length} filtered`;
      const area = getAreaDef();
      const modeBits = [
        state.loopAll ? "loop" : "stop at end",
        state.shuffle ? "shuffle" : "order"
      ];

      els.playerKicker.textContent = hasTrack
        ? `${area.label} · Shield ${String(idx + 1).padStart(2, "0")} of ${tracks.length}`
        : `${area.label} · Ready`;
      els.playerName.textContent = hasTrack ? current.title : "Tap any shield to play a song";
      els.playerHint.textContent = hasTrack
        ? `${current.artist} · ${playing ? "Now playing" : "Paused"} · ${modeBits.join(" / ")}`
        : `${queueText} · ${modeBits.join(" / ")}`;
      els.playerStatus.textContent = playing ? "Playing" : "Paused";
      els.playerShield.innerHTML = shieldSVG(Math.max(0, idx), hasTrack && playing, true, `player_${state.activeAreaKey}`);
      els.live.textContent = hasTrack ? `${current.title}. ${playing ? "Playing" : "Paused"}.` : "Player ready.";
      updateUtilityButtons();
      scheduleSyncPlayerSpace();
    }

    function updateUtilityButtons() {
      const queue = getQueueIndices();
      els.loopBtn.setAttribute("aria-pressed", String(state.loopAll));
      els.loopBtn.textContent = state.loopAll ? "Loop All" : "No Loop";
      els.shuffleBtn.setAttribute("aria-pressed", String(state.shuffle));
      els.shuffleBtn.textContent = state.shuffle ? "Shuffle On" : "Shuffle";
      els.clearFilterBtn.disabled = !state.filterQuery.trim();
      els.jumpCurrentBtn.disabled = state.currentIndex < 0;
      els.jumpCurrentBtn.textContent = state.currentIndex >= 0 ? "Current" : "No Current";
      els.playAllBtn.disabled = queue.length === 0;
      els.playAllBtn.textContent = state.filterQuery.trim()
        ? (queue.length ? `Play ${queue.length}` : "No Match")
        : "Play All";
    }

    function updateTimeUI() {
      const dur = els.audio.duration;
      const cur = els.audio.currentTime;
      if (!state.isSeeking) {
        if (Number.isFinite(dur) && dur > 0) {
          els.seekBar.value = String(Math.round((cur / dur) * 1000));
        } else {
          els.seekBar.value = "0";
        }
      }
      els.timeNow.textContent = fmtTime(cur);
      els.timeTotal.textContent = fmtTime(dur);
    }

    function preloadDurations() {
      const areaKey = state.activeAreaKey;
      const token = ++state.preloadToken;
      const localTracks = tracks.slice();
      localTracks.forEach((track, index) => {
        const temp = new Audio();
        temp.preload = "metadata";
        temp.src = encodeURI(track.file);
        temp.addEventListener("loadedmetadata", () => {
          if (token !== state.preloadToken) return;
          if (Number.isFinite(temp.duration)) {
            state.durationByIndex.set(trackCacheKey(index, areaKey), temp.duration);
            if (state.activeAreaKey !== areaKey) return;
            const card = els.list.querySelector(`.song-card[data-index="${index}"] [data-role="duration"]`);
            if (card) card.textContent = fmtTime(temp.duration);
          }
          temp.src = "";
        }, { once: true });
        temp.addEventListener("error", () => {
          if (token !== state.preloadToken || state.activeAreaKey !== areaKey) return;
          const card = els.list.querySelector(`.song-card[data-index="${index}"] [data-role="duration"]`);
          if (card) card.textContent = "--:--";
        }, { once: true });
      });
    }

    function toggleBigText() {
      state.biggerText = !state.biggerText;
      document.body.classList.toggle("big-text", state.biggerText);
      els.bigTextBtn.setAttribute("aria-pressed", String(state.biggerText));
      els.bigTextBtn.textContent = state.biggerText ? "Text +" : "Text";
      vibrate(8);
      scheduleSyncPlayerSpace();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[m]));
    }

    els.playPauseBtn.addEventListener("click", togglePlayPause);
    els.prevBtn.addEventListener("click", prevTrack);
    els.nextBtn.addEventListener("click", nextTrack);
    els.playAllBtn.addEventListener("click", playAllFromStart);
    els.bigTextBtn.addEventListener("click", toggleBigText);
    els.loopBtn.addEventListener("click", toggleLoopAll);
    els.shuffleBtn.addEventListener("click", toggleShuffle);
    els.jumpCurrentBtn.addEventListener("click", scrollToCurrent);
    els.clearFilterBtn.addEventListener("click", () => {
      els.filterInput.value = "";
      state.filterQuery = "";
      renderList();
      els.filterInput.focus();
      vibrate(8);
    });
    els.filterInput.addEventListener("input", () => {
      state.filterQuery = els.filterInput.value;
      renderList();
    });

    els.seekBar.addEventListener("pointerdown", () => { state.isSeeking = true; });
    els.seekBar.addEventListener("pointerup", () => { state.isSeeking = false; });
    els.seekBar.addEventListener("input", () => {
      state.isSeeking = true;
      const dur = els.audio.duration;
      if (!Number.isFinite(dur) || dur <= 0) return;
      const target = (Number(els.seekBar.value) / 1000) * dur;
      els.timeNow.textContent = fmtTime(target);
    });
    els.seekBar.addEventListener("change", () => {
      const dur = els.audio.duration;
      if (!Number.isFinite(dur) || dur <= 0) {
        state.isSeeking = false;
        return;
      }
      els.audio.currentTime = (Number(els.seekBar.value) / 1000) * dur;
      state.isSeeking = false;
    });

    els.audio.addEventListener("timeupdate", updateTimeUI);
    els.audio.addEventListener("loadedmetadata", () => {
      updateTimeUI();
      if (state.currentIndex >= 0 && Number.isFinite(els.audio.duration)) {
        state.durationByIndex.set(trackCacheKey(state.currentIndex), els.audio.duration);
        const card = els.list.querySelector(`.song-card[data-index="${state.currentIndex}"] [data-role="duration"]`);
        if (card) card.textContent = fmtTime(els.audio.duration);
      }
    });
    els.audio.addEventListener("play", () => { refreshCards(); updatePlayerHeader(); });
    els.audio.addEventListener("pause", () => { refreshCards(); updatePlayerHeader(); });
    els.audio.addEventListener("ended", handleTrackEnded);
    els.audio.addEventListener("error", () => {
      els.playerStatus.textContent = "Error";
      els.playerHint.textContent = "Could not load file";
    });

    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => scheduleSyncPlayerSpace());
      ro.observe(els.player);
    }
    if (els.finderWrap) els.finderWrap.addEventListener("toggle", scheduleSyncPlayerSpace);
    if (els.playerExtra) els.playerExtra.addEventListener("toggle", scheduleSyncPlayerSpace);
    window.addEventListener("resize", syncResponsivePanels);

    setActiveArea(state.activeAreaKey);
    syncResponsivePanels();
  </script>
</body>
</html>
